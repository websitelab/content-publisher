name: Auto-publish Posts (24hr)

on:
  schedule:
    - cron: '0 * * * *'   # Check every hour
  workflow_dispatch:

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Auto-merge stale content PRs
        run: node scripts/auto-publish.js
        env:
          GITHUB_PAT: ${{ secrets.ORG_GITHUB_PAT }}
          FB_PAGE_TOKEN_MSJC: ${{ secrets.FB_PAGE_TOKEN_MSJC }}
          FB_PAGE_TOKEN_CSSC: ${{ secrets.FB_PAGE_TOKEN_CSSC }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
