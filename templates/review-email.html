<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f9f9f9;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }
    .header {
      background: #24485F;
      padding: 24px 28px;
      text-align: center;
    }
    .header img {
      height: 40px;
      width: auto;
    }
    .body {
      padding: 28px 28px 20px;
    }
    .greeting {
      margin-bottom: 16px;
    }
    .post-title {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin: 12px 0;
    }
    .summary {
      color: #555;
      margin-bottom: 16px;
    }
    .preview-box {
      background: #f5f5f5;
      border-left: 3px solid #CB9E57;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 14px;
      color: #444;
      border-radius: 0 4px 4px 0;
    }
    .auto-publish {
      background: #FFF8EC;
      border: 1px solid #CB9E57;
      border-radius: 6px;
      padding: 12px 16px;
      margin: 16px 0;
      font-size: 13px;
      color: #8B6914;
    }
    .actions {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .actions a {
      display: inline-block;
      margin-right: 16px;
      margin-bottom: 8px;
      font-size: 14px;
      text-decoration: none;
    }
    .action-approve { color: #16a34a; font-weight: 600; }
    .action-feedback { color: #2563eb; }
    .action-deny { color: #999; }
    .preview-link {
      display: inline-block;
      margin: 12px 0;
      font-size: 14px;
      color: #2563eb;
      text-decoration: none;
    }
    .footer {
      background: #24485F;
      padding: 16px 28px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }
    .footer a {
      color: #CB9E57;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://www.websitelab.biz/images/logo-white.webp" alt="Website Lab" height="40">
    </div>

    <div class="body">
      <div class="greeting">{{greeting}}</div>

      <div class="summary">{{summary}}</div>

      <div class="post-title">"{{title}}"</div>

      <div class="preview-box">
        {{preview}}
      </div>

      <a href="{{previewUrl}}" class="preview-link">See the full post on the preview site &rarr;</a>

      <div class="auto-publish">
        This post will be published automatically in 24 hours. Use the links below to approve it now, request changes, or remove it.
      </div>

      <div class="actions">
        <a href="{{approveUrl}}" class="action-approve">Approve now</a>
        <a href="{{feedbackUrl}}" class="action-feedback">Request changes</a>
        <a href="{{denyUrl}}" class="action-deny">Remove</a>
      </div>
    </div>

    <div class="footer">
      A service by <a href="https://www.websitelab.biz">Website Lab</a> &middot; - David
    </div>
  </div>
</body>
</html>
