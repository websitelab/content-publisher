<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      max-width: 580px;
      margin: 0 auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .container {
      background: #ffffff;
      border-radius: 6px;
      padding: 32px 28px;
      border: 1px solid #e8e8e8;
    }
    .greeting {
      margin-bottom: 14px;
    }
    .summary {
      color: #555;
      margin-bottom: 4px;
    }
    .post-title {
      font-size: 18px;
      font-weight: 600;
      color: #24485F;
      margin: 6px 0 14px;
    }
    .preview-box {
      background: #fafafa;
      border-left: 3px solid #CB9E57;
      padding: 12px 14px;
      margin: 14px 0;
      font-size: 14px;
      color: #555;
      line-height: 1.7;
    }
    .preview-link {
      font-size: 14px;
      color: #24485F;
      font-weight: 500;
    }
    .auto-note {
      margin: 18px 0;
      font-size: 13px;
      color: #888;
      font-style: italic;
    }
    .actions {
      margin: 20px 0 0;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 14px;
    }
    .actions a {
      text-decoration: none;
      margin-right: 18px;
    }
    .action-approve { color: #16a34a; font-weight: 600; }
    .action-feedback { color: #24485F; }
    .action-deny { color: #aaa; }
    .sig {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid #eee;
    }
    .sig img {
      height: 28px;
      width: auto;
      display: block;
      margin-bottom: 6px;
    }
    .sig-text {
      font-size: 12px;
      color: #aaa;
    }
    .sig-text a {
      color: #888;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="greeting">{{greeting}}</div>
    <div class="summary">{{summary}}</div>
    <div class="post-title">{{title}}</div>

    <div class="preview-box">{{preview}}</div>

    <p><a href="{{previewUrl}}" class="preview-link">Read the full post &rarr;</a></p>

    <div class="auto-note">This post will publish automatically in 24 hours unless you take action below.</div>

    <div class="actions">
      <a href="{{approveUrl}}" class="action-approve">Approve</a>
      <a href="{{feedbackUrl}}" class="action-feedback">Request changes</a>
      <a href="{{denyUrl}}" class="action-deny">Remove</a>
    </div>

    <div class="sig">
      <img src="https://www.websitelab.biz/images/logo-color.png" alt="Website Lab" height="28">
      <div class="sig-text"><a href="https://www.websitelab.biz">websitelab.biz</a> &middot; (586) 209-4725</div>
    </div>
  </div>
</body>
</html>
