<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f9f9f9;
    }
    .container {
      background: #fff;
      border-radius: 8px;
      padding: 28px 24px;
    }
    .greeting {
      margin-bottom: 16px;
    }
    .post-title {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin: 12px 0;
    }
    .summary {
      color: #555;
      margin-bottom: 16px;
    }
    .preview-box {
      background: #f5f5f5;
      border-left: 3px solid #ddd;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 14px;
      color: #444;
      border-radius: 0 4px 4px 0;
    }
    .actions {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .actions a {
      display: inline-block;
      margin-right: 16px;
      margin-bottom: 8px;
      font-size: 14px;
      text-decoration: none;
    }
    .action-approve { color: #16a34a; font-weight: 600; }
    .action-feedback { color: #2563eb; }
    .action-deny { color: #999; }
    .preview-link {
      display: inline-block;
      margin: 12px 0;
      font-size: 14px;
      color: #2563eb;
      text-decoration: none;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="greeting">{{greeting}}</div>

    <div class="summary">{{summary}}</div>

    <div class="post-title">"{{title}}"</div>

    <div class="preview-box">
      {{preview}}
    </div>

    <a href="{{previewUrl}}" class="preview-link">See the full post on the preview site</a>

    <div class="actions">
      <a href="{{prUrl}}/merge" class="action-approve">Approve and publish</a>
      <a href="{{prUrl}}#issuecomment-new" class="action-feedback">Leave a note</a>
      <a href="{{prUrl}}/close" class="action-deny">Kill it</a>
    </div>

    <div class="footer">
      Sent by Blog Publisher for {{siteName}}
    </div>
  </div>
</body>
</html>
