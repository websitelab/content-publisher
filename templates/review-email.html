<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f4f4f4;
    }
    .container {
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
    }
    .content {
      padding: 32px 28px 24px;
    }
    .greeting {
      margin-bottom: 16px;
      color: #333;
    }
    .summary {
      color: #555;
      margin-bottom: 4px;
    }
    .post-title {
      font-size: 20px;
      font-weight: 700;
      color: #24485F;
      margin: 8px 0 16px;
    }
    .preview-box {
      background: #f8f8f8;
      border-left: 3px solid #CB9E57;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 14px;
      color: #555;
      border-radius: 0 4px 4px 0;
      line-height: 1.7;
    }
    .preview-link {
      display: inline-block;
      margin: 8px 0 20px;
      font-size: 14px;
      color: #24485F;
      font-weight: 500;
    }
    .auto-publish {
      background: #FFFBF0;
      border-left: 3px solid #CB9E57;
      border-radius: 0 4px 4px 0;
      padding: 12px 16px;
      margin: 0 0 24px;
      font-size: 13px;
      color: #7A6320;
      line-height: 1.5;
    }
    .buttons {
      margin: 24px 0 8px;
    }
    .btn {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn-approve {
      background: #16a34a;
      color: #ffffff;
    }
    .btn-feedback {
      background: #24485F;
      color: #ffffff;
    }
    .btn-deny {
      background: #f4f4f4;
      color: #888;
      border: 1px solid #ddd;
    }
    .signature {
      padding: 24px 28px;
      border-top: 1px solid #eee;
    }
    .sig-logo {
      margin-bottom: 8px;
    }
    .sig-logo img {
      height: 36px;
      width: auto;
    }
    .sig-text {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }
    .sig-text a {
      color: #24485F;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="greeting">{{greeting}}</div>

      <div class="summary">{{summary}}</div>

      <div class="post-title">{{title}}</div>

      <div class="preview-box">
        {{preview}}
      </div>

      <a href="{{previewUrl}}" class="preview-link">Read the full post &rarr;</a>

      <div class="auto-publish">
        This post will be published automatically in 24 hours. You can approve it now, request changes, or remove it using the buttons below.
      </div>

      <div class="buttons">
        <a href="{{approveUrl}}" class="btn btn-approve">Approve</a>
        <a href="{{feedbackUrl}}" class="btn btn-feedback">Request Changes</a>
        <a href="{{denyUrl}}" class="btn btn-deny">Remove</a>
      </div>
    </div>

    <div class="signature">
      <div class="sig-logo">
        <a href="https://www.websitelab.biz"><img src="https://www.websitelab.biz/images/logo-color.webp" alt="Website Lab" height="36"></a>
      </div>
      <div class="sig-text">
        <a href="https://www.websitelab.biz">websitelab.biz</a> &middot; (586) 209-4725
      </div>
    </div>
  </div>
</body>
</html>
